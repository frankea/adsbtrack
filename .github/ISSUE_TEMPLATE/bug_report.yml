name: Bug Report
description: Report a problem with adsbtrack
labels: ["bug"]
body:
  - type: input
    id: aircraft
    attributes:
      label: Aircraft
      description: ICAO hex code or tail number (if relevant)
      placeholder: "a66ad3 / N512WB"
    validations:
      required: false
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the bug clearly.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: false
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Commands or steps to reproduce the issue.
      placeholder: |
        1. uv run python -m adsbtrack.cli fetch --hex ...
        2. uv run python -m adsbtrack.cli extract --hex ...
    validations:
      required: false
  - type: input
    id: version
    attributes:
      label: Version
      description: Output of `uv run python -m adsbtrack.cli --version` or commit hash
    validations:
      required: false
