<!doctype html>
<html data-theme="dark"><head>
<meta charset="utf-8">
<title>Keyboard shortcuts</title>
<link rel="stylesheet" href="_card.css">
</head><body class="card">
  <div class="label-tiny" style="margin-bottom:12px">Keyboard shortcuts &middot; action bar glyphs</div>
  <div class="row" style="gap: 14px; font-family: var(--font-mono); font-size: 12px; color: var(--fg-1);">
    <span><kbd>/</kbd> search</span>
    <span><kbd>f</kbd> filter</span>
    <span><kbd>j</kbd> next</span>
    <span><kbd>k</kbd> prev</span>
    <span><kbd>g</kbd><kbd>g</kbd> top</span>
    <span><kbd>G</kbd> bottom</span>
    <span><kbd>:</kbd> jump to hex</span>
    <span><kbd>esc</kbd> back</span>
    <span><kbd>?</kbd> help</span>
  </div>
  <div class="row" style="gap: 14px; font-family: var(--font-mono); font-size: 12px; color: var(--fg-1); margin-top: 14px;">
    <span><kbd>e</kbd> events</span>
    <span><kbd>s</kbd> status</span>
    <span><kbd>t</kbd> trips</span>
    <span><kbd>m</kbd> map</span>
    <span><kbd>r</kbd> refresh</span>
    <span><kbd>q</kbd> quit</span>
  </div>
</body></html>
