<!doctype html>
<html data-theme="dark"><head>
<meta charset="utf-8">
<title>Position source palette</title>
<link rel="stylesheet" href="_card.css">
</head><body class="card">
  <div class="label-tiny" style="margin-bottom:14px">Position-source palette (map overlay)</div>
  <div class="grid" style="grid-template-columns: repeat(5, 1fr); gap: 12px;">
    <div><div class="swatch" style="background:#4ec07a"></div><div class="swatch-name">ADS-B</div><div class="swatch-hex">#4ec07a</div></div>
    <div><div class="swatch" style="background:#6b7885"></div><div class="swatch-name">MLAT</div><div class="swatch-hex">#6b7885</div></div>
    <div><div class="swatch" style="background:#f2b136"></div><div class="swatch-name">TIS-B</div><div class="swatch-hex">#f2b136</div></div>
    <div><div class="swatch" style="background:#4fb8e0"></div><div class="swatch-name">ADS-R</div><div class="swatch-hex">#4fb8e0</div></div>
    <div><div class="swatch" style="background:#c24bd6"></div><div class="swatch-name">ADS-C</div><div class="swatch-hex">#c24bd6</div></div>
  </div>
</body></html>
