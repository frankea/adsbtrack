<!doctype html>
<html data-theme="dark"><head>
<meta charset="utf-8">
<title>Spacing scale</title>
<link rel="stylesheet" href="_card.css">
</head><body class="card">
  <div class="label-tiny" style="margin-bottom:12px">4-based spacing scale</div>
  <div class="col" style="gap: 6px;">
    <div class="row" style="gap:8px"><div style="width:60px" class="swatch-hex">4 s-1</div><div style="height:12px; width:4px; background:var(--accent-cyan)"></div></div>
    <div class="row" style="gap:8px"><div style="width:60px" class="swatch-hex">8 s-2</div><div style="height:12px; width:8px; background:var(--accent-cyan)"></div></div>
    <div class="row" style="gap:8px"><div style="width:60px" class="swatch-hex">12 s-3</div><div style="height:12px; width:12px; background:var(--accent-cyan)"></div></div>
    <div class="row" style="gap:8px"><div style="width:60px" class="swatch-hex">16 s-4</div><div style="height:12px; width:16px; background:var(--accent-cyan)"></div></div>
    <div class="row" style="gap:8px"><div style="width:60px" class="swatch-hex">24 s-6</div><div style="height:12px; width:24px; background:var(--accent-cyan)"></div></div>
    <div class="row" style="gap:8px"><div style="width:60px" class="swatch-hex">32 s-8</div><div style="height:12px; width:32px; background:var(--accent-cyan)"></div></div>
    <div class="row" style="gap:8px"><div style="width:60px" class="swatch-hex">48 s-12</div><div style="height:12px; width:48px; background:var(--accent-cyan)"></div></div>
    <div class="row" style="gap:8px"><div style="width:60px" class="swatch-hex">64 s-16</div><div style="height:12px; width:64px; background:var(--accent-cyan)"></div></div>
  </div>
</body></html>
