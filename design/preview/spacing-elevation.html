<!doctype html>
<html data-theme="dark"><head>
<meta charset="utf-8">
<title>Elevation / surface stack</title>
<link rel="stylesheet" href="_card.css">
</head><body class="card">
  <div class="label-tiny" style="margin-bottom:12px">Elevation is implied by 1px border + surface step. No drop shadows.</div>
  <div style="position: relative; width: 100%; padding: 16px; background: var(--bg-0); border: 1px solid var(--bd-0);">
    <div class="swatch-hex" style="margin-bottom:8px">bg-0 &middot; page</div>
    <div style="padding: 14px; background: var(--bg-1); border: 1px solid var(--bd-0); border-radius: 4px;">
      <div class="swatch-hex" style="margin-bottom:8px">bg-1 &middot; panel</div>
      <div style="padding: 10px; background: var(--bg-2); border: 1px solid var(--bd-0); border-radius: 2px;">
        <div class="swatch-hex">bg-2 &middot; row / cell hover</div>
      </div>
    </div>
  </div>
</body></html>
