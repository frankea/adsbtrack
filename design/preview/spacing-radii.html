<!doctype html>
<html data-theme="dark"><head>
<meta charset="utf-8">
<title>Radii & borders</title>
<link rel="stylesheet" href="_card.css">
</head><body class="card">
  <div class="label-tiny" style="margin-bottom:12px">Corner radii &mdash; sharp by default. Borders &mdash; 1px hairline, no shadow</div>
  <div class="row" style="gap:24px; align-items: flex-end;">
    <div class="col"><div style="width:64px; height:40px; background:var(--bg-1); border:1px solid var(--bd-0); border-radius:0;"></div><div class="swatch-name">0 table / input</div></div>
    <div class="col"><div style="width:64px; height:40px; background:var(--bg-1); border:1px solid var(--bd-0); border-radius:2px;"></div><div class="swatch-name">2 button / pill</div></div>
    <div class="col"><div style="width:64px; height:40px; background:var(--bg-1); border:1px solid var(--bd-0); border-radius:4px;"></div><div class="swatch-name">4 card</div></div>
    <div class="col"><div style="width:64px; height:40px; background:var(--bg-1); border:1px solid var(--bd-focus); border-radius:2px; outline: 1px solid var(--bd-focus); outline-offset: 1px;"></div><div class="swatch-name">focus ring</div></div>
  </div>
</body></html>
