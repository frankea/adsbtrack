<!doctype html>
<html data-theme="light"><head>
<meta charset="utf-8">
<title>Light theme</title>
<link rel="stylesheet" href="_card.css">
</head><body class="card">
  <div class="label-tiny" style="margin-bottom:14px; color: var(--fg-2)">Warm-neutral light alternative</div>
  <div class="grid" style="grid-template-columns: repeat(7, 1fr); gap: 10px;">
    <div><div class="swatch" style="background:#f5f0e8"></div><div class="swatch-name">bg-0</div><div class="swatch-hex">#f5f0e8</div></div>
    <div><div class="swatch" style="background:#ece5d6"></div><div class="swatch-name">bg-1</div><div class="swatch-hex">#ece5d6</div></div>
    <div><div class="swatch" style="background:#e1d9c6"></div><div class="swatch-name">bg-2</div><div class="swatch-hex">#e1d9c6</div></div>
    <div><div class="swatch" style="background:#1a1814"></div><div class="swatch-name">fg-0</div><div class="swatch-hex">#1a1814</div></div>
    <div><div class="swatch" style="background:#2f8a4f"></div><div class="swatch-name">ok</div><div class="swatch-hex">#2f8a4f</div></div>
    <div><div class="swatch" style="background:#b5362c"></div><div class="swatch-name">red</div><div class="swatch-hex">#b5362c</div></div>
    <div><div class="swatch" style="background:#8a2ea3"></div><div class="swatch-name">violet</div><div class="swatch-hex">#8a2ea3</div></div>
  </div>
</body></html>
