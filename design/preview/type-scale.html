<!doctype html>
<html data-theme="dark"><head>
<meta charset="utf-8">
<title>Type scale</title>
<link rel="stylesheet" href="_card.css">
</head><body class="card">
  <div class="label-tiny" style="margin-bottom:10px">Type scale &mdash; tight, small, instrument-first</div>
  <div class="col" style="gap: 4px;">
    <div style="font: 600 28px/1.15 var(--font-sans);">28 &middot; section title</div>
    <div style="font: 600 24px/1.15 var(--font-sans);">24 &middot; page title (h1)</div>
    <div style="font: 600 18px/1.35 var(--font-sans);">18 &middot; panel title (h2)</div>
    <div style="font: 500 15px/1.3 var(--font-sans); text-transform: uppercase; letter-spacing: 0.08em; color: var(--fg-1);">15 &middot; SECTION LABEL (H3)</div>
    <div style="font: 400 14px/1.55 var(--font-sans); color: var(--fg-1);">14 &middot; prose reading size</div>
    <div style="font: 400 13px/1.4 var(--font-mono); color: var(--fg-0);">13 &middot; base UI / table rows</div>
    <div style="font: 400 12px/1.4 var(--font-mono); color: var(--fg-1);">12 &middot; secondary data</div>
    <div style="font: 400 11px/1.3 var(--font-mono); color: var(--fg-2); text-transform: uppercase; letter-spacing: 0.06em;">11 &middot; caption / key glyph</div>
  </div>
</body></html>
