<!doctype html>
<html data-theme="dark"><head>
<meta charset="utf-8">
<title>Semantic accents</title>
<link rel="stylesheet" href="_card.css">
</head><body class="card">
  <div class="label-tiny" style="margin-bottom:14px">Semantic accents &mdash; meaning, not decoration</div>
  <div class="grid" style="grid-template-columns: repeat(5, 1fr); gap: 12px;">
    <div><div class="swatch" style="background:#4ec07a"></div><div class="swatch-name">ok</div><div class="swatch-hex">#4ec07a</div><div class="swatch-label">confirmed</div></div>
    <div><div class="swatch" style="background:#4fb8e0"></div><div class="swatch-name">cyan</div><div class="swatch-hex">#4fb8e0</div><div class="swatch-label">identifier</div></div>
    <div><div class="swatch" style="background:#f2b136"></div><div class="swatch-name">amber</div><div class="swatch-hex">#f2b136</div><div class="swatch-label">anomaly</div></div>
    <div><div class="swatch" style="background:#e0433a"></div><div class="swatch-name">red</div><div class="swatch-hex">#e0433a</div><div class="swatch-label">emergency</div></div>
    <div><div class="swatch" style="background:#c24bd6"></div><div class="swatch-name">violet</div><div class="swatch-hex">#c24bd6</div><div class="swatch-label">spoof</div></div>
  </div>
</body></html>
