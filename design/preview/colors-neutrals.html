<!doctype html>
<html data-theme="dark"><head>
<meta charset="utf-8">
<title>Neutrals</title>
<link rel="stylesheet" href="_card.css">
</head><body class="card">
  <div class="label-tiny" style="margin-bottom:14px">Neutral surfaces &amp; foregrounds</div>
  <div class="grid" style="grid-template-columns: repeat(7, 1fr); gap: 10px;">
    <div><div class="swatch" style="background:#0b0f14"></div><div class="swatch-name">bg-0</div><div class="swatch-hex">#0b0f14</div></div>
    <div><div class="swatch" style="background:#141b23"></div><div class="swatch-name">bg-1</div><div class="swatch-hex">#141b23</div></div>
    <div><div class="swatch" style="background:#1c242e"></div><div class="swatch-name">bg-2</div><div class="swatch-hex">#1c242e</div></div>
    <div><div class="swatch" style="background:#232d39"></div><div class="swatch-name">bg-3</div><div class="swatch-hex">#232d39</div></div>
    <div><div class="swatch" style="background:#6b7885"></div><div class="swatch-name">fg-2</div><div class="swatch-hex">#6b7885</div></div>
    <div><div class="swatch" style="background:#aab6c2"></div><div class="swatch-name">fg-1</div><div class="swatch-hex">#aab6c2</div></div>
    <div><div class="swatch" style="background:#e4ecf3"></div><div class="swatch-name">fg-0</div><div class="swatch-hex">#e4ecf3</div></div>
  </div>
</body></html>
