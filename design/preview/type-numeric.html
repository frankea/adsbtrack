<!doctype html>
<html data-theme="dark"><head>
<meta charset="utf-8">
<title>Numeric specimen</title>
<link rel="stylesheet" href="_card.css">
</head><body class="card">
  <div class="label-tiny" style="margin-bottom:12px">Tabular nums &mdash; numeric columns align on the decimal</div>
  <div style="border: 1px solid var(--bd-0); background: var(--bg-1); max-width: 620px;">
    <div class="table-row table-head" style="grid-template-columns: 120px 80px 80px 80px 80px;">
      <div>CALLSIGN</div><div style="text-align:right">ALT FT</div><div style="text-align:right">GS KT</div><div style="text-align:right">DIST NM</div><div style="text-align:right">CONF %</div>
    </div>
    <div class="table-row" style="grid-template-columns: 120px 80px 80px 80px 80px;">
      <div>N512WB</div><div class="num">18500</div><div class="num">250</div><div class="num">142.3</div><div class="num c-ok">89</div>
    </div>
    <div class="table-row" style="grid-template-columns: 120px 80px 80px 80px 80px;">
      <div>N90QR</div><div class="num">  3200</div><div class="num">  92</div><div class="num">  8.7</div><div class="num c-amber">54</div>
    </div>
    <div class="table-row" style="grid-template-columns: 120px 80px 80px 80px 80px;">
      <div>EMRAT6</div><div class="num">37000</div><div class="num">491</div><div class="num">2141.0</div><div class="num c-red">12</div>
    </div>
  </div>
</body></html>
