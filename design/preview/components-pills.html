<!doctype html>
<html data-theme="dark"><head>
<meta charset="utf-8">
<title>Severity pills</title>
<link rel="stylesheet" href="_card.css">
</head><body class="card">
  <div class="label-tiny" style="margin-bottom:12px">Severity pills &middot; event-feed tokens</div>
  <div class="row" style="gap: 8px;">
    <span class="pill bg-red c-red" style="border: 1px solid var(--accent-red);">EMERGENCY 7700</span>
    <span class="pill bg-red c-red" style="border: 1px solid var(--accent-red);">HIJACK 7500</span>
    <span class="pill bg-red c-red" style="border: 1px solid var(--accent-red);">NORDO 7600</span>
    <span class="pill bg-amber c-amber" style="border: 1px solid var(--accent-amber);">OFF-AIRPORT</span>
    <span class="pill bg-amber c-amber" style="border: 1px solid var(--accent-amber);">LONG HOVER</span>
    <span class="pill bg-amber c-amber" style="border: 1px solid var(--accent-amber);">GO-AROUND x2</span>
    <span class="pill bg-violet c-violet" style="border: 1px solid var(--accent-violet);">SPOOFED</span>
    <span class="pill bg-ok c-ok" style="border: 1px solid var(--accent-ok);">OK</span>
    <span class="pill" style="border: 1px solid var(--bd-0); color: var(--fg-2);">UNCLASSIFIED</span>
  </div>
  <div class="row" style="gap: 8px; margin-top: 16px;">
    <span class="pill" style="background: var(--src-adsb); color:#0b0f14;">ADS-B</span>
    <span class="pill" style="background: var(--src-mlat); color:#0b0f14;">MLAT</span>
    <span class="pill" style="background: var(--src-tisb); color:#0b0f14;">TIS-B</span>
    <span class="pill" style="background: var(--src-adsr); color:#0b0f14;">ADS-R</span>
    <span class="pill" style="background: var(--src-adsc); color:#0b0f14;">ADS-C</span>
  </div>
</body></html>
